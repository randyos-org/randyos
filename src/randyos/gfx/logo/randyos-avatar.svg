<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 100 100"
   version="1.1"
   id="svg50"
   sodipodi:docname="randyos-avatar.svg"
   inkscape:version="1.4.2 (f4327f4, 2025-05-13)"
   inkscape:export-filename="randyos-avatar-darkbg.png"
   inkscape:export-xdpi="576"
   inkscape:export-ydpi="576"
   width="100"
   height="100"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview50"
     pagecolor="#505050"
     bordercolor="#eeeeee"
     borderopacity="1"
     inkscape:showpageshadow="0"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#505050"
     inkscape:zoom="3.7958333"
     inkscape:cx="49.001098"
     inkscape:cy="66.520308"
     inkscape:window-width="1920"
     inkscape:window-height="1009"
     inkscape:window-x="1912"
     inkscape:window-y="-1"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg50"
     inkscape:export-bgcolor="#8b7bdc00" />
  <!-- ============================================================
       RandyOS logo - Venus is the "O"; Orion is superimposed on
       the capital "R"; "andy" is lowercase; the starfield is the
       real surrounding sky (Taurus, Aries, Pisces, Cetus), all
       plotted from J2000 coordinates under ONE shared transform:

         dRA = minutes of RA past 5h00m * 0.25 deg (short way
               around the 24h wrap), scaled by cos(dec)
         x'  = 13.8 - dRA          (east left, north up)
         y'  = 9.93 - dec
         P   = (39 + 4.32 x', 77 + 4.32 (y' - 2.53))
         then rotated 6.403 deg CLOCKWISE about Betelgeuse - the
         exact angle that makes the Betelgeuse-Saiph line vertical
         - and anchored with Betelgeuse at (42, 77), so both stars
         sit precisely on the R's stem line (x = 42).

       The R's anatomy follows the stars:
         - Betelgeuse and Bellatrix are its top-left and top-right
           points; Saiph sits on the stem line below the base.
         - The bowl's bottom stroke is NOT horizontal: it leaves
           the bowl circle at the exact point where the circle's
           tangent equals the belt's slope (30.47 deg down-west),
           so curve flows into line with no kink, and Mintaka,
           Alnilam, and Alnitak all ride the stroke.

       Letterforms use sharp terminals (butt caps, miter joins).
       Only Orion's stars draw in front of the letters. Off-frame
       or hidden, but real: Sirius and Procyon east (left) of the
       frame; Diphda just below the bottom edge; Epsilon Piscium
       behind Venus; Mira behind the y's arm.

       Designed for dark backgrounds; transparent by default.
       Feature budget: paths, circles, groups, radial + linear
       gradients, one clip path. SMIL <animate> elements are
       optional - delete them and nothing breaks.
       ============================================================ -->
  <!-- <rect width="480" height="220" fill="#0B0E1A"/> -->
  <defs
     id="defs9">
    <linearGradient
       id="swatch1"
       inkscape:swatch="solid">
      <stop
         style="stop-color:#e9eef5;stop-opacity:1;"
         offset="0"
         id="stop10" />
    </linearGradient>
    <radialGradient
       id="venusGrad"
       cx="330.07999"
       cy="99.440002"
       r="56.100002"
       fx="330.07999"
       fy="99.440002"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#FFF3D6"
         id="stop1" />
      <stop
         offset="0.45"
         stop-color="#F2CD8A"
         id="stop2" />
      <stop
         offset="0.75"
         stop-color="#DFA45C"
         id="stop3" />
      <stop
         offset="1"
         stop-color="#B9793B"
         id="stop4" />
    </radialGradient>
    <linearGradient
       id="terminator"
       x1="305"
       y1="77"
       x2="371"
       y2="77"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0.55"
         stop-color="#000000"
         stop-opacity="0"
         id="stop5" />
      <stop
         offset="1"
         stop-color="#1A0F08"
         stop-opacity="0.45"
         id="stop6" />
    </linearGradient>
    <radialGradient
       id="nebulaGrad"
       cx="56.900002"
       cy="134.3"
       r="5.5"
       fx="56.900002"
       fy="134.3"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#F4B8C9"
         stop-opacity="0.8"
         id="stop7" />
      <stop
         offset="0.6"
         stop-color="#C9A0D6"
         stop-opacity="0.35"
         id="stop8" />
      <stop
         offset="1"
         stop-color="#C9A0D6"
         stop-opacity="0"
         id="stop9" />
    </radialGradient>
    <clipPath
       id="venusClip">
      <circle
         cx="338"
         cy="110"
         r="33"
         id="circle9" />
    </clipPath>
  </defs>
  <!-- ============ Real sky, all BEHIND the wordmark ============ -->
  <!-- Wordmark: R andy [Venus] S - geometric strokes, no font
       needed; sharp terminals throughout. Caps R and S; lowercase
       a n d y. The R's bowl-bottom leaves the bowl tangentially
       and descends at the belt's exact slope to the stem. -->
  <!-- ============ Orion, worn by the R (in front) ============ -->
  <!-- Venus, standing in for a capital O -->
  <g
     id="venus"
     style="display:inline"
     transform="translate(-288.60456,-59.340724)">
    <circle
       cx="338"
       cy="110"
       r="35.5"
       fill="none"
       stroke="#f2cd8a"
       stroke-width="2.5"
       opacity="0.28"
       id="circle46"
       style="display:inline" />
    <circle
       cx="338"
       cy="110"
       r="33"
       fill="url(#venusGrad)"
       id="circle47"
       style="display:inline;fill:url(#venusGrad)" />
    <g
       id="clouds"
       clip-path="url(#venusClip)"
       fill="none"
       stroke-linecap="round"
       opacity="0.5"
       style="display:inline">
      <path
         d="m 302,92 q 27,10.5 72,-1.5"
         stroke="#fff7e0"
         stroke-width="4.5"
         opacity="0.45"
         id="path47" />
      <path
         d="m 303.5,108.5 q 34.5,12 69,-3"
         stroke="#c88a46"
         stroke-width="5.3"
         opacity="0.35"
         id="path48" />
      <path
         d="m 306.5,126.5 q 30,9 64.5,-3"
         stroke="#fff1ce"
         stroke-width="3.8"
         opacity="0.35"
         id="path49" />
      <path
         d="m 362.41653,87.473015 q -28.94249,7.837093 -49.53202,-2.32875"
         stroke="#d89a55"
         stroke-width="5.51878"
         opacity="0.3"
         id="path50"
         inkscape:transform-center-x="-0.49241769"
         inkscape:transform-center-y="-0.56406185" />
    </g>
    <circle
       cx="338"
       cy="110"
       r="33"
       fill="url(#terminator)"
       clip-path="url(#venusClip)"
       id="circle50"
       style="display:inline;fill:url(#terminator)" />
  </g>
  <g
     id="wordmark"
     fill="none"
     stroke="#e9eef5"
     stroke-width="9"
     stroke-linecap="butt"
     stroke-linejoin="miter"
     transform="translate(-228.80214,-57.23315)">
    <path
       id="path10"
       d="M 263.61369,140.21992 V 78.755334 h 15.94884 a 14.952028,15.366151 0 0 1 7.58563,28.611776 l -23.53447,14.21882 m 15.94884,-9.63972 17.94242,28.27371"
       style="fill:none;fill-opacity:1;stroke:#000000;stroke-width:12.527;stroke-linecap:butt;stroke-linejoin:miter;stroke-dasharray:none;stroke-opacity:1;paint-order:normal" />
    <path
       id="ltr-R"
       d="M 263.29528,138.68277 V 78.682766 h 16 a 15,15 0 0 1 7.61,27.930004 l -23.61,13.88 m 16,-9.41 18,27.6"
       style="fill:none;fill-opacity:1;stroke:#ffffff;stroke-linecap:butt;stroke-linejoin:miter;stroke-opacity:1;paint-order:normal" />
  </g>
  <g
     id="orion-in-R"
     transform="translate(-8.2971953,-59.867618)">
    <!-- M42 (Orion Nebula) glow behind the sword -->
    <circle
       cx="56.900002"
       cy="134.3"
       r="5.5"
       fill="url(#nebulaGrad)"
       id="circle36"
       style="fill:url(#nebulaGrad)" />
    <g
       id="orion-sword"
       fill="#d7e2f2">
      <!-- 42 Orionis - sword, northern star -->
      <path
         d="m 57,129.7 0.8,1.4 1.4,0.8 -1.4,0.8 -0.8,1.4 -0.8,-1.4 -1.4,-0.8 1.4,-0.8 z"
         fill="#d7e2f2"
         opacity="0.85"
         id="path36" />
      <!-- Theta Orionis (Trapezium), embedded in M42 - sword, middle -->
      <path
         d="m 56.9,131.7 0.9,1.7 1.7,0.9 -1.7,0.9 -0.9,1.7 -0.9,-1.7 -1.7,-0.9 1.7,-0.9 z"
         fill="#d7e2f2"
         opacity="0.95"
         id="path37" />
      <!-- Iota Orionis (Hatysa) - sword, southern star -->
      <path
         d="m 56.5,134.1 0.8,1.6 1.6,0.8 -1.6,0.8 -0.8,1.6 -0.8,-1.6 -1.6,-0.8 1.6,-0.8 z"
         fill="#d7e2f2"
         opacity="0.9"
         id="path38" />
    </g>
    <g
       id="orion-stars">
      <!-- Meissa (Lambda Orionis) - the hunter's head -->
      <path
         d="m 64.9,65.4 1.1,2.1 2.1,1.1 -2.1,1.1 -1.1,2.1 -1.1,-2.1 -2.1,-1.1 2.1,-1.1 z"
         fill="#dde6f5"
         opacity="0.9"
         id="path39" />
      <!-- Betelgeuse (Alpha Orionis) - shoulder star on the stem's top corner; red supergiant and famous variable, hence the slow pulse -->
      <path
         d="M 42,71 44.1,74.9 48,77 44.1,79.1 42,83 39.9,79.1 36,77 39.9,74.9 Z"
         fill="#ffad70"
         id="path40">
        <animate
           attributeName="opacity"
           values="1;0.72;1"
           dur="9s"
           repeatCount="indefinite" />
      </path>
      <!-- Bellatrix (Gamma Orionis) - shoulder star, the R's top-right point on the bowl's outer arc -->
      <path
         d="m 73.5,80.3 1.7,3.1 3.1,1.7 -3.1,1.7 -1.7,3.1 -1.7,-3.1 -3.1,-1.7 3.1,-1.7 z"
         fill="#AFC8F2"
         id="path41"
         style="fill:#a3bff0;fill-opacity:1;stroke:#7061d9;stroke-opacity:0.551821" />
      <!-- Mintaka (Delta Orionis) - belt, western end -->
      <path
         d="m 62.7,108.6 1.5,2.7 2.7,1.5 -2.7,1.5 -1.5,2.7 -1.5,-2.7 -2.7,-1.5 2.7,-1.5 z"
         fill="#B6CDF4"
         id="path42"
         style="fill:#a3bff0;fill-opacity:1;stroke:#7061d9;stroke-opacity:0.551821" />
      <!-- Alnilam (Epsilon Orionis) - belt, center -->
      <path
         d="m 57.8,111.8 1.5,2.9 2.9,1.5 -2.9,1.5 -1.5,2.9 -1.5,-2.9 -2.9,-1.5 2.9,-1.5 z"
         fill="#BCD1F6"
         id="path43"
         style="fill:#a3bff0;fill-opacity:1;stroke:#7061d9;stroke-opacity:0.551821" />
      <!-- Alnitak (Zeta Orionis) - belt, eastern end -->
      <path
         d="m 52.5,114.4 1.5,2.9 2.9,1.5 -2.9,1.5 -1.5,2.9 -1.5,-2.9 -2.9,-1.5 2.9,-1.5 z"
         fill="#BCD1F6"
         id="path44"
         style="fill:#a3bff0;fill-opacity:1;stroke:#7061d9;stroke-opacity:0.551821" />
      <!-- Saiph (Kappa Orionis) - right foot, directly below Betelgeuse on the stem line -->
      <path
         d="m 42,146.8 1.5,2.9 2.9,1.5 -2.9,1.5 -1.5,2.9 -1.5,-2.9 -2.9,-1.5 2.9,-1.5 z"
         fill="#B6CDF4"
         id="path45"
         style="fill:#82a6e8;fill-opacity:1" />
      <!-- Rigel (Beta Orionis) - left foot; blue supergiant off the tip of the R's leg -->
      <path
         d="m 77.8,142.9 2.1,3.9 3.9,2.1 -3.9,2.1 -2.1,3.9 -2.1,-3.9 -3.9,-2.1 3.9,-2.1 z"
         fill="#9FC0FF"
         id="path46"
         style="fill:#6da0ff;fill-opacity:1" />
    </g>
  </g>
</svg>
