       fill="none"
       stroke-linecap="round"
       opacity="0.5">
      <path
         d="M302,92 Q329,102.5 374,90.5"
         stroke="#FFF7E0"
         stroke-width="4.5"
         opacity="0.45"
         id="path47" />
      <path
         d="M303.5,108.5 Q338,120.5 372.5,105.5"
         stroke="#C88A46"
         stroke-width="5.3"
         opacity="0.35"
         id="path48" />
      <path
         d="M306.5,126.5 Q336.5,135.5 371,123.5"
         stroke="#FFF1CE"
         stroke-width="3.8"
         opacity="0.35"
         id="path49" />
      <path
         d="m 362.41653,87.473015 q -28.94249,7.837093 -49.53202,-2.32875"
         stroke="#d89a55"
         stroke-width="5.51878"
         opacity="0.3"
         id="path50"
         inkscape:transform-center-x="-0.49241769"
         inkscape:transform-center-y="-0.56406185" />
    </g>
    <circle
       cx="338"
       cy="110"
       r="33"
       fill="url(#terminator)"
       clip-path="url(#venusClip)"
       id="circle50" />
  </g>
</svg>
